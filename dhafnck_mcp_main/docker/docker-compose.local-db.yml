# Docker Compose Override for Local PostgreSQL
# Use this to override Supabase with local PostgreSQL for better performance

version: '3.8'

services:
  dhafnck-mcp:
    environment:
      # Override database configuration to use local PostgreSQL
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://postgres:dev123@host.docker.internal:5432/dhafnck_mcp
      
      # Performance optimizations
      - PERFORMANCE_MODE=true
      - USE_OPTIMIZED_REPOSITORY=true
      - ENABLE_LAZY_LOADING=true
      - ENABLE_CACHE=true
      
      # Connection pool settings (optimized for local)
      - DB_POOL_SIZE=20
      - DB_MAX_OVERFLOW=30
      - DB_POOL_TIMEOUT=10
      - DB_POOL_RECYCLE=1800
      
      # Reduced timeouts for local
      - DB_STATEMENT_TIMEOUT=5s
      - DB_LOCK_TIMEOUT=3s
      
      # Debug settings
      - SQL_DEBUG=false
      - LOG_LEVEL=INFO
    
    extra_hosts:
      # Allow container to connect to host's PostgreSQL
      - "host.docker.internal:host-gateway"
    
    depends_on:
      - postgres-local
  
  # Local PostgreSQL service (alternative to external container)
  postgres-local:
    image: postgres:15-alpine
    container_name: dhafnck-postgres-integrated
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dev123
      - POSTGRES_DB=dhafnck_mcp
    ports:
      - "5433:5432"  # Use different port to avoid conflict
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_local_data: