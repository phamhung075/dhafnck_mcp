# Docker Compose Override - Uses root .env file
# This file ensures that docker-compose uses the root .env file
# instead of looking for .env in the docker/ directory

services:
  dhafnck-mcp:
    env_file:
      - ../../.env  # Use root .env file
    
  postgres:
    env_file:
      - ../../.env  # Use root .env file
    
  redis:
    env_file:
      - ../../.env  # Use root .env file