<!DOCTYPE html>
<html>
<head>
    <title>Clear DhafnckMCP Cookies</title>
</head>
<body>
    <h1>Cookie Cleaner for DhafnckMCP</h1>
    <p>This page will clear authentication cookies that might be causing task listing issues.</p>
    
    <button onclick="clearCookies()">Clear Authentication Cookies</button>
    <div id="result"></div>
    
    <script>
        function clearCookies() {
            // Clear access_token cookie
            document.cookie = "access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            
            // Clear refresh_token cookie
            document.cookie = "refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            
            // Clear any other potential cookies
            const cookies = document.cookie.split(";");
            for (let cookie of cookies) {
                const eqPos = cookie.indexOf("=");
                const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
                document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            }
            
            document.getElementById('result').innerHTML = '<p style="color: green;">Cookies cleared! Please refresh the DhafnckMCP page at <a href="http://localhost:3000">http://localhost:3000</a></p>';
        }
        
        // Show current cookies
        document.addEventListener('DOMContentLoaded', function() {
            const cookies = document.cookie || 'No cookies found';
            document.getElementById('result').innerHTML = '<p>Current cookies: ' + cookies + '</p>';
        });
    </script>
</body>
</html>
